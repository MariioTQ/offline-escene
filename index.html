<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>BRB — MariioTQ</title>
  <script src="https://player.twitch.tv/js/embed/v1.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    /* ── DOBLE BUFFER: dos players apilados ── */
    .player-wrap {
      position: absolute;
      inset: 0;
      transition: opacity 0s;
    }
    #wrap-b { opacity: 0; }

    .player-wrap iframe,
    .player-wrap > div {
      width: 1920px !important;
      height: 1080px !important;
      border: none !important;
    }

    /* Ocultar controles de Twitch con una capa encima */
    .player-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 10;
      pointer-events: none;
    }

    /* ── GRADIENTE ── */
    #vignette {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 32%);
      pointer-events: none;
      z-index: 20;
    }

    /* ── BADGE BRB ── */
    #brb-badge {
      position: absolute;
      bottom: 52px;
      right: 60px;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
      z-index: 30;
    }
    #brb-badge .label {
      font-size: 11px; font-weight: 700;
      letter-spacing: 5px; text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }
    #brb-badge .brb-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 92px; line-height: 0.88;
      color: #fff; letter-spacing: 8px;
    }
    #brb-badge .brb-text span { color: #e63946; }
    #brb-badge .channel {
      font-size: 13px; font-weight: 700;
      letter-spacing: 4px; text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }
    #brb-badge::before {
      content: '';
      position: absolute;
      top: 0; bottom: 0; left: -18px;
      width: 3px; background: #e63946; border-radius: 2px;
    }

    /* ── CARGA ── */
    #loading {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #000; gap: 18px;
      z-index: 50;
    }
    .dots { display: flex; gap: 10px; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #e63946;
      animation: blink 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    #loading p {
      font-size: 11px; font-weight: 700;
      letter-spacing: 5px; text-transform: uppercase; color: #333;
    }
    @keyframes blink {
      0%,100% { opacity:.2; transform:scale(.7); }
      50%      { opacity:1;  transform:scale(1); }
    }

    #error {
      display: none; position: absolute; inset: 0;
      align-items: center; justify-content: center;
      background: #000; color: #333;
      font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
      z-index: 50;
    }
  </style>
</head>
<body>

  <div id="wrap-a" class="player-wrap"></div>
  <div id="wrap-b" class="player-wrap"></div>
  <div id="vignette"></div>

  <div id="brb-badge">
    <div class="label">vuelvo enseguida</div>
    <div class="brb-text">B<span>R</span>B</div>
    <div class="channel">MariioTQ</div>
  </div>

  <div id="loading">
    <div class="dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <p>Cargando clips…</p>
  </div>

  <div id="error">No hay clips disponibles</div>

  <script>
    // ═══════════════════════════════════════
    //  CONFIGURACIÓN
    // ═══════════════════════════════════════
    const CLIENT_ID    = '8guuqqrcoegsja82dwufpbrlnn180s';
    const ACCESS_TOKEN = 'di4qtnpkf1m4s17cr9ggnzyufx7mf1';
    const CHANNEL      = 'mariotq';
    const FEATURED     = true;
    const PARENT       = 'mariiotq.github.io';
    // ═══════════════════════════════════════

    const wrapA   = document.getElementById('wrap-a');
    const wrapB   = document.getElementById('wrap-b');
    const loading = document.getElementById('loading');
    const errorEl = document.getElementById('error');

    let playlist = [];
    let shuffled = [];
    let idx      = 0;

    let playerA  = null;
    let playerB  = null;
    let activeWrap   = wrapA;
    let standbyWrap  = wrapB;
    let activePlayer = null;
    let standbyPlayer = null;
    let swapping = false;

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function nextClip() {
      if (idx >= shuffled.length) {
        shuffled = shuffle(playlist);
        idx = 0;
      }
      return shuffled[idx++];
    }

    function peekClip() {
      const peekIdx = idx % shuffled.length;
      return shuffled[peekIdx];
    }

    // Crea un nuevo Twitch.Player en el contenedor indicado
    function createPlayer(container, clipId) {
      // Limpiar contenedor
      container.innerHTML = '';
      const divId = container.id + '-player';
      const div = document.createElement('div');
      div.id = divId;
      container.appendChild(div);

      const player = new Twitch.Player(divId, {
        clip:    clipId,
        width:   1920,
        height:  1080,
        autoplay: false,
        muted:   false,
        parent:  [PARENT],
      });
      return player;
    }

    function swap() {
      if (swapping) return;
      swapping = true;

      // Mostrar standby, ocultar active
      activeWrap.style.opacity  = '0';
      standbyWrap.style.opacity = '1';

      // Reproducir el standby
      standbyPlayer.play();

      // Intercambiar roles
      const tmpWrap   = activeWrap;
      const tmpPlayer = activePlayer;
      activeWrap    = standbyWrap;
      activePlayer  = standbyPlayer;
      standbyWrap   = tmpWrap;
      standbyPlayer = tmpPlayer;

      // Precargar siguiente en el nuevo standby
      const nextClipData = peekClip();
      standbyPlayer = createPlayer(standbyWrap, nextClipData.id);
      idx++;
      if (idx >= shuffled.length) {
        shuffled = shuffle(playlist);
        idx = 0;
      }

      // Cuando termine el clip activo, swap de nuevo
      activePlayer.addEventListener(Twitch.Player.ENDED, () => {
        swapping = false;
        swap();
      });

      swapping = false;
    }

    async function twitchGet(url) {
      const res = await fetch(url, {
        headers: {
          'Client-Id': CLIENT_ID,
          'Authorization': `Bearer ${ACCESS_TOKEN}`,
        }
      });
      if (!res.ok) throw new Error(`Twitch ${res.status}`);
      return res.json();
    }

    async function init() {
      try {
        // 1. Obtener broadcaster_id
        const users = await twitchGet(
          `https://api.twitch.tv/helix/users?login=${CHANNEL}`
        );
        const uid = users.data?.[0]?.id;
        if (!uid) throw new Error('Canal no encontrado');

        // 2. Jalar clips
        const clips = [];
        let cursor  = null;
        let pages   = 0;
        do {
          const url = new URL('https://api.twitch.tv/helix/clips');
          url.searchParams.set('broadcaster_id', uid);
          url.searchParams.set('first', '100');
          if (FEATURED) url.searchParams.set('is_featured', 'true');
          if (cursor)   url.searchParams.set('after', cursor);
          const data = await twitchGet(url.toString());
          clips.push(...(data.data || []));
          cursor = data.pagination?.cursor || null;
          pages++;
          if (pages >= 10) break;
        } while (cursor);

        if (clips.length === 0) throw new Error('Sin clips');

        playlist = clips;
        shuffled = shuffle(playlist);
        idx      = 0;

        loading.style.display = 'none';

        // 3. Primer clip en player A
        const first = nextClip();
        activePlayer = createPlayer(activeWrap, first.id);

        activePlayer.addEventListener(Twitch.Player.READY, () => {
          activePlayer.play();

          // 4. Precargar segundo clip en player B
          const second = peekClip();
          standbyPlayer = createPlayer(standbyWrap, second.id);
          idx++;
          if (idx >= shuffled.length) {
            shuffled = shuffle(playlist);
            idx = 0;
          }
        });

        // Al terminar primer clip
        activePlayer.addEventListener(Twitch.Player.ENDED, () => {
          swap();
        });

      } catch (e) {
        console.error(e);
        loading.style.display = 'none';
        errorEl.style.display = 'flex';
      }
    }

    init();
  </script>

</body>
</html>
