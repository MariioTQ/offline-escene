<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>BRB — MariioTQ</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    #video-a, #video-b {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      background: #000;
    }
    #video-b { opacity: 0; }

    #vignette {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 32%);
      pointer-events: none;
      z-index: 20;
    }

    #brb-badge {
      position: absolute;
      bottom: 52px; right: 60px;
      pointer-events: none;
      display: flex; flex-direction: column;
      align-items: flex-end; gap: 4px;
      z-index: 30;
    }
    #brb-badge .label {
      font-size: 11px; font-weight: 700;
      letter-spacing: 5px; text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }
    #brb-badge .brb-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 92px; line-height: 0.88;
      color: #fff; letter-spacing: 8px;
    }
    #brb-badge .brb-text span { color: #e63946; }
    #brb-badge .channel {
      font-size: 13px; font-weight: 700;
      letter-spacing: 4px; text-transform: uppercase;
      color: rgba(255,255,255,0.45);
    }
    #brb-badge::before {
      content: '';
      position: absolute;
      top: 0; bottom: 0; left: -18px;
      width: 3px; background: #e63946; border-radius: 2px;
    }

    #loading {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #000; gap: 18px; z-index: 50;
    }
    .dots { display: flex; gap: 10px; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #e63946;
      animation: blink 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }
    #loading p {
      font-size: 11px; font-weight: 700;
      letter-spacing: 5px; text-transform: uppercase; color: #333;
    }
    @keyframes blink {
      0%,100% { opacity:.2; transform:scale(.7); }
      50%      { opacity:1;  transform:scale(1); }
    }

    #error {
      display: none; position: absolute; inset: 0;
      align-items: center; justify-content: center;
      background: #000; color: #333;
      font-size: 12px; letter-spacing: 3px; text-transform: uppercase;
      z-index: 50;
    }
  </style>
</head>
<body>

  <video id="video-a" autoplay playsinline muted></video>
  <video id="video-b" playsinline muted></video>
  <div id="vignette"></div>

  <div id="brb-badge">
    <div class="label">vuelvo enseguida</div>
    <div class="brb-text">B<span>R</span>B</div>
    <div class="channel">MariioTQ</div>
  </div>

  <div id="loading">
    <div class="dots">
      <div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <p>Cargando clips…</p>
  </div>

  <div id="error">No hay clips disponibles</div>

  <script>
    // ═══════════════════════════════════════
    //  CONFIGURACIÓN
    // ═══════════════════════════════════════
    const CLIENT_ID    = '8guuqqrcoegsja82dwufpbrlnn180s';
    const ACCESS_TOKEN = 'di4qtnpkf1m4s17cr9ggnzyufx7mf1';
    const CHANNEL      = 'mariotq';
    const FEATURED     = true;
    // ═══════════════════════════════════════

    const vA      = document.getElementById('video-a');
    const vB      = document.getElementById('video-b');
    const loading = document.getElementById('loading');
    const errorEl = document.getElementById('error');

    let playlist = [];
    let shuffled = [];
    let idx      = 0;
    let active   = vA;
    let standby  = vB;
    let swapping = false;

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function getNext() {
      if (idx >= shuffled.length) { shuffled = shuffle(playlist); idx = 0; }
      return shuffled[idx++];
    }

    function peekNext() {
      return shuffled[idx % shuffled.length];
    }

    // ── GQL: obtiene URL firmada del MP4 ─────────────
    async function getMp4Url(slug) {
      const res = await fetch('https://gql.twitch.tv/gql', {
        method: 'POST',
        headers: {
          'Client-Id': 'kimne78kx3ncx6brgo4mv6wki5h1ko',
          'Content-Type': 'application/json',
        },
        body: JSON.stringify([{
          operationName: 'VideoAccessToken_Clip',
          variables: { slug },
          extensions: {
            persistedQuery: {
              version: 1,
              sha256Hash: '36b89d2507fce29e5ca551df756d27c1cfe079e2609642b4390aa4c35796eb11'
            }
          }
        }])
      });

      const data      = await res.json();
      const clip      = data[0]?.data?.clip;
      const qualities = clip?.videoQualities;
      const token     = clip?.playbackAccessToken;

      if (!qualities?.length || !token) throw new Error(`Sin datos para ${slug}`);

      // Preferir 1080p
      const q = qualities.find(q => q.quality === '1080') || qualities[0];

      // Agregar firma a la URL — igual que hace el player oficial de Twitch
      const url = new URL(q.sourceURL);
      url.searchParams.set('sig',   token.signature);
      url.searchParams.set('token', token.value);

      return url.toString();
    }

    // ── Precarga standby ─────────────────────────────
    async function preloadStandby() {
      try {
        const clip = peekNext();
        const url  = await getMp4Url(clip.id);
        standby.src = url;
        standby.load();
      } catch (e) {
        console.warn('Error precargando:', e);
      }
    }

    // ── Swap ─────────────────────────────────────────
    async function swap() {
      if (swapping) return;
      swapping = true;

      active.style.opacity  = '0';
      standby.style.opacity = '1';
      standby.play().catch(() => {});

      const tmp = active;
      active  = standby;
      standby = tmp;

      idx++;
      if (idx >= shuffled.length) { shuffled = shuffle(playlist); idx = 0; }
      await preloadStandby();

      swapping = false;
    }

    // ── Helix API ────────────────────────────────────
    async function twitchGet(url) {
      const res = await fetch(url, {
        headers: {
          'Client-Id': CLIENT_ID,
          'Authorization': `Bearer ${ACCESS_TOKEN}`,
        }
      });
      if (!res.ok) throw new Error(`Twitch ${res.status}`);
      return res.json();
    }

    // ── Init ─────────────────────────────────────────
    async function init() {
      try {
        const users = await twitchGet(
          `https://api.twitch.tv/helix/users?login=${CHANNEL}`
        );
        const uid = users.data?.[0]?.id;
        if (!uid) throw new Error('Canal no encontrado');

        const clips = [];
        let cursor  = null;
        let pages   = 0;
        do {
          const url = new URL('https://api.twitch.tv/helix/clips');
          url.searchParams.set('broadcaster_id', uid);
          url.searchParams.set('first', '100');
          if (FEATURED) url.searchParams.set('is_featured', 'true');
          if (cursor)   url.searchParams.set('after', cursor);
          const data = await twitchGet(url.toString());
          clips.push(...(data.data || []));
          cursor = data.pagination?.cursor || null;
          pages++;
          if (pages >= 10) break;
        } while (cursor);

        if (clips.length === 0) throw new Error('Sin clips');

        playlist = clips;
        shuffled = shuffle(playlist);
        idx      = 0;

        // Primer clip
        const first    = getNext();
        const firstUrl = await getMp4Url(first.id);
        active.src = firstUrl;
active.load();
await active.play();
active.muted = false;

        // Precargar segundo
        await preloadStandby();

        loading.style.display = 'none';

      } catch (e) {
        console.error('Error al iniciar:', e);
        loading.style.display = 'none';
        errorEl.style.display = 'flex';
      }
    }

    vA.addEventListener('ended', swap);
    vB.addEventListener('ended', swap);
    vA.addEventListener('error', () => { swapping = false; setTimeout(swap, 300); });
    vB.addEventListener('error', () => { swapping = false; setTimeout(swap, 300); });

    init();
  </script>

</body>
</html>
